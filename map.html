const globe = Globe()(document.getElementById("globe"))

.globeImageUrl("https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg")

.backgroundColor("#000")

.showAtmosphere(true)

.pointsData(STATIONS)

.pointLat(d => d.lat)

.pointLng(d => d.lng)

.pointColor(() => "#1db954")

.pointRadius(0.28)

.pointAltitude(0)

.onPointClick(d => {

currentIndex = STATIONS.indexOf(d);

playStation(currentIndex);

});

globe.pointOfView({ lat:20, lng:78, altitude:2 });

globe.controls().autoRotate = true;
globe.controls().autoRotateSpeed = 1.0;

let resumeRotationTimeout;
globe.controls().addEventListener('start', () => {
    globe.controls().autoRotate = false;
    clearTimeout(resumeRotationTimeout);
});

globe.controls().addEventListener('end', () => {
    resumeRotationTimeout = setTimeout(() => {
        globe.controls().autoRotate = true;
    }, 5000);
});

let currentIndex = -1;

const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");
const stopBtn = document.getElementById("stopBtn");
const nextBtn = document.getElementById("nextBtn");
const prevBtn = document.getElementById("prevBtn");
const title = document.getElementById("title");
const meta = document.getElementById("meta");

function playStation(i){

if(i < 0 || i >= STATIONS.length) return;

const s = STATIONS[i];

audio.pause();
audio.src = s.url;

audio.play().then(()=>{

title.textContent = s.name;
meta.textContent = s.city + ", " + s.country;
playBtn.textContent="⏸";

}).catch(()=>{

meta.textContent = "Stream unavailable";

});

}

playBtn.onclick = ()=>{

if(audio.paused){
audio.play();
playBtn.textContent="⏸";
}else{
audio.pause();
playBtn.textContent="▶";
}

};

stopBtn.onclick = ()=>{
audio.pause();
audio.src="";
playBtn.textContent="▶";
};

nextBtn.onclick = ()=>{
currentIndex=(currentIndex+1)%STATIONS.length;
playStation(currentIndex);
};

prevBtn.onclick = ()=>{
currentIndex=(currentIndex-1+STATIONS.length)%STATIONS.length;
playStation(currentIndex);
};
